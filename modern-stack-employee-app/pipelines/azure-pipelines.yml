trigger:
  branches:
    include:
      - main
      - develop

pool:
  vmImage: 'ubuntu-latest'

variables:
  buildConfiguration: 'Release'
  dotnetVersion: '10.0.x'
  nodeVersion: '22.x'

stages:
- stage: Build
  displayName: Build and Test
  jobs:
  - job: Build
    steps:
    - task: UseDotNet@2
      displayName: Install .NET SDK
      inputs:
        packageType: sdk
        version: '$(dotnetVersion)'

    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd backend/EmployeeApp.Api
        dotnet restore
        dotnet build --configuration $(buildConfiguration) --no-restore
      displayName: Build .NET API

    - script: |
        cd frontend/employee-client
        npm ci
        npm run build
      displayName: Build Angular Client

    - script: |
        cd backend/EmployeeApp.Api
        dotnet publish --configuration $(buildConfiguration) --output $(Build.ArtifactStagingDirectory)/api
      displayName: Publish API Artifact

    - task: PublishBuildArtifacts@1
      displayName: Publish Build Artifacts
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: drop
        publishLocation: Container

- stage: Deploy_Dev
  displayName: Deploy to Dev
  dependsOn: Build
  condition: succeeded()
  jobs:
  - deployment: DeployApi
    environment: dev
    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: drop

          - task: AzureWebApp@1
            displayName: Deploy API to Azure App Service
            inputs:
              azureSubscription: 'REPLACE_WITH_SERVICE_CONNECTION'
              appType: 'webAppLinux'
              appName: 'REPLACE_WITH_APP_SERVICE_NAME'
              package: '$(Pipeline.Workspace)/drop/api'
