name: CI – Build, Lint & Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  # ── Backend: build + test ───────────────────────────────────────────────────
  backend:
    name: .NET 8 API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        working-directory: backend/PortfolioManager.Api
        run: dotnet restore

      - name: Build (Release)
        working-directory: backend/PortfolioManager.Api
        run: dotnet build --configuration Release --no-restore

      - name: Run unit tests
        working-directory: backend
        run: |
          if [ -d "PortfolioManager.Tests" ]; then
            dotnet test --configuration Release --no-build --verbosity normal
          else
            echo "No test project found – skipping (create backend/PortfolioManager.Tests to add tests)"
          fi

      - name: Publish API artifact
        working-directory: backend/PortfolioManager.Api
        run: dotnet publish --configuration Release --output ${{ github.workspace }}/artifacts/api

      - name: Upload API drop
        uses: actions/upload-artifact@v4
        with:
          name: api-drop
          path: ${{ github.workspace }}/artifacts/api
          retention-days: 7

  # ── Frontend: lint + build ──────────────────────────────────────────────────
  frontend:
    name: Angular 22 Client
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Angular 22 requires Node 22 LTS
      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"
          # Only use cache when lock file exists to avoid CI failure
          cache: ${{ hashFiles('frontend/portfolio-manager-ui/package-lock.json') != '' && 'npm' || '' }}
          cache-dependency-path: frontend/portfolio-manager-ui/package-lock.json

      - name: Install dependencies
        working-directory: frontend/portfolio-manager-ui
        # Use npm install (not npm ci) so it works with or without a lock file
        run: npm install --prefer-offline --no-audit

      - name: Lint (skip if no lint target configured)
        working-directory: frontend/portfolio-manager-ui
        run: |
          if npx ng lint --help > /dev/null 2>&1; then
            npx ng lint || echo "Lint warnings present – review before merge"
          else
            echo "No lint target configured in angular.json – skipping"
          fi

      - name: Production build
        working-directory: frontend/portfolio-manager-ui
        run: npx ng build --configuration production

      - name: Upload Angular drop
        uses: actions/upload-artifact@v4
        with:
          name: angular-drop
          path: frontend/portfolio-manager-ui/dist
          retention-days: 7

  # ── Security: dependency audit ──────────────────────────────────────────────
  security:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.x"

      - name: Install frontend dependencies
        working-directory: frontend/portfolio-manager-ui
        run: npm install --prefer-offline --no-audit

      - name: npm audit (high+)
        working-directory: frontend/portfolio-manager-ui
        run: npm audit --audit-level=high || echo "Review npm audit output above"

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: NuGet vulnerability check
        working-directory: backend/PortfolioManager.Api
        run: dotnet list package --vulnerable --include-transitive 2>&1 | tee vuln-report.txt

  # ── Notify on success ───────────────────────────────────────────────────────
  notify-success:
    name: Notify on Success
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: success() && github.event_name == 'push'

    steps:
      - name: Send success notification
        uses: actions/github-script@v7
        with:
          script: |
            const branch = context.ref.replace('refs/heads/', '');
            const sha    = context.sha.slice(0, 7);
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            core.notice(`✅ CI passed on ${branch} (${sha}) — ${runUrl}`);

# NOTE: Set this secret in GitHub → Settings → Secrets → Actions:
#   SQL_CONNECTION_STRING  → Server=...;Database=PortfolioManagerDb;...
#   (No API key needed – market data is sourced from Yahoo Finance)
