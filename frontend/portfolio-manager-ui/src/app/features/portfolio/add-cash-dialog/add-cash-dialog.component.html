<h2 mat-dialog-title>
  <mat-icon>payments</mat-icon>
  Add Cash Position
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="cash-form">
    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <input matInput formControlName="description" placeholder="CASH" autocomplete="off" />
      @if (form.controls.description.hasError('required')) {
        <mat-error>Description is required</mat-error>
      }
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Amount</mat-label>
      <span matTextPrefix>$&nbsp;</span>
      <input
        matInput
        type="number"
        formControlName="amount"
        placeholder="0.00"
        step="0.01"
        min="0.01"
      />
      @if (form.controls.amount.hasError('required')) {
        <mat-error>Amount is required</mat-error>
      }
      @if (form.controls.amount.hasError('min')) {
        <mat-error>Amount must be greater than 0</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="cancel()" [disabled]="saving()">Cancel</button>
  <button mat-flat-button color="primary" (click)="submit()" [disabled]="form.invalid || saving()">
    @if (saving()) {
      <mat-spinner diameter="18" />
    } @else {
      <mat-icon>add</mat-icon>
    }
    Add to Portfolio
  </button>
</mat-dialog-actions>
